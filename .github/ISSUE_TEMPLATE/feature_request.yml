name: Feature Request
description: Suggest a documentation, tooling, or compatibility improvement for this patch repository.
title: "[idea] "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Short summary
      placeholder: Add a launcher variant for a different Wine layout
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Explain the gap or friction in the current repo.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      placeholder: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      placeholder: Hardware, launcher layout, related issue, logs, etc.
    validations:
      required: false
